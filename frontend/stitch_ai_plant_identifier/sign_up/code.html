        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .botanical-overlay {
            background: linear-gradient(to right, rgba(25, 66, 18, 0.4), rgba(25, 66, 18, 0.1));
        }
    </style>
</head>
<body class="bg-background text-on-surface selection:bg-primary-container selection:text-on-primary-container">
<main class="min-h-screen flex flex-col md:flex-row">
<!-- Left Side: Botanical Imagery -->
<section class="hidden md:flex md:w-1/2 lg:w-3/5 relative overflow-hidden">
<div class="absolute inset-0 z-0">
<img alt="Lush conservatory" class="w-full h-full object-cover" data-alt="Interior of a sun-drenched Victorian greenhouse filled with tropical ferns, large monsteras, and misty air, high-quality architectural photography style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBKR_2ZSDAsOQrbCafNwlNFnAaokNjeo1ajMbYeswok3YSGsR6kPu3WXk0Uf3EQYuc-WdBaPiR-URLjN7Zqzr2e3GRBQJXXb3hdsE9uvzdHM6BaUg8NoAjpF288KsYBIRzrZQK5sH8UNWnVK0nQ2gMlcx6h_JMGlnm3SxDpVWAbIMI1eEFjaRuSQU4TsSkDNzJ2Stu6piy8QsfT9x1IZ6i2g_vWriCW8dLWbvbaUFduKhRFxEx0uRYLUH6leJTwejsjqc4U31u_qp8" style="">
<div class="absolute inset-0 botanical-overlay"></div>
</div>
<div class="relative z-10 p-lg flex flex-col justify-between h-full">
<div class="flex items-center gap-2">
<span class="font-headline-lg text-white italic font-semibold" style="">Organic Botanist</span>
</div>
<div class="max-w-md">
<h1 class="font-headline-xl text-white mb-md" style="">Discover the wisdom of the natural world.</h1>
<p class="font-body-lg text-white/90" style="">Join our community of plant enthusiasts and scientific experts cultivating a deeper connection with nature.</p>
</div>
<div class="text-white/60 font-label-sm" style=""><br></div>
</div>
</section>
<!-- Right Side: Sign Up Form -->
<section class="flex-1 flex flex-col justify-center items-center p-gutter md:p-lg bg-surface-container-lowest">
<div class="w-full max-w-[440px]">
<!-- Mobile Branding -->
<div class="md:hidden mb-lg text-center">
<span class="font-headline-lg text-primary italic font-semibold" style="">Organic Botanist</span>
</div>
<div class="mb-lg">
<h2 class="font-headline-lg text-primary mb-xs" style="">Create your account</h2>
<p class="font-body-md text-on-surface-variant" style="">Start your botanical journey today.</p>
</div>
<form class="space-y-md">
<!-- Full Name -->
<div class="space-y-xs">
<label class="font-label-sm text-on-surface-variant ml-1" for="name" style="">Full Name</label>
<input class="w-full px-md py-sm bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary-container focus:bg-white transition-all font-body-md outline-none" id="name" placeholder="Linnaeus Smith" type="text">
</div>
<!-- Email Address -->
<div class="space-y-xs">
<label class="font-label-sm text-on-surface-variant ml-1" for="email" style="">Email Address</label>
<input class="w-full px-md py-sm bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary-container focus:bg-white transition-all font-body-md outline-none" id="email" placeholder="botanist@example.com" type="email">
</div><div class="space-y-xs">
<label class="font-label-sm text-on-surface-variant ml-1" for="phone" style="">Phone Number</label>
<input class="w-full px-md py-sm bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary-container focus:bg-white transition-all font-body-md outline-none" id="phone" placeholder="+1 (555) 000-0000" type="tel">
</div>
<!-- Password -->
<div class="space-y-xs">
<label class="font-label-sm text-on-surface-variant ml-1" for="password" style="">New Password</label>
<div class="relative">
<input class="w-full px-md py-sm bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary-container focus:bg-white transition-all font-body-md outline-none" id="password" placeholder="••••••••" type="password">
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button" style="">
<span class="material-symbols-outlined text-[20px]" style="">visibility</span>
</button>
</div><div class="space-y-xs">
<label class="font-label-sm text-on-surface-variant ml-1" for="confirm-password" style="">Confirm Password</label>
<div class="relative">
<input class="w-full px-md py-sm bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary-container focus:bg-white transition-all font-body-md outline-none" id="confirm-password" placeholder="••••••••" type="password">
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button" style="">
<span class="material-symbols-outlined text-[20px]" style="">visibility</span>
</button>
</div>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-sm pt-xs">
<input class="mt-1 w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary" id="terms" type="checkbox">
<label class="font-body-md text-on-surface-variant text-sm" for="terms" style="">
                            I agree to the <a class="text-primary font-medium hover:underline" href="#" style="">Terms of Service</a> and <a class="text-primary font-medium hover:underline" href="#" style="">Privacy Policy</a>.
                        </label>
</div>
<!-- Submit Button -->
<button class="w-full py-sm bg-primary-container text-on-primary-container font-label-sm rounded-xl shadow-[0_4px_20px_rgba(45,90,39,0.15)] hover:bg-primary transition-all active:scale-[0.98] mt-md" type="submit" style="">
                        Create Account
                    </button>
</form>
<!-- Divider -->
<div class="relative my-lg">
<div class="absolute inset-0 flex items-center">
<span class="w-full border-t border-outline-variant"></span>
</div>
<div class="relative flex justify-center text-sm">
<span class="bg-surface-container-lowest px-md text-on-surface-variant font-label-sm" style="">OR CONTINUE WITH</span>
</div>
</div>
<!-- Social Options -->
<div class="grid gap-md flex-col">
<button class="flex items-center justify-center gap-sm py-sm border border-outline-variant rounded-xl hover:bg-surface-container transition-colors font-label-sm text-on-surface" style="">
<svg class="w-5 h-5" viewBox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="currentColor"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="currentColor"></path>
</svg>
                        Google
                    </button>
</div>
<!-- Footer Link -->
<div class="mt-xl text-center">
<p class="font-body-md text-on-surface-variant" style="">
                        Already have an account? 
                        <a class="text-primary font-semibold hover:underline underline-offset-4 ml-1" href="#" style="">Sign In</a>
</p>
</div>
</div>
</section>
</main>
<!-- Support Floating FAB (Contextual for help during sign up) -->
<div class="fixed bottom-gutter right-gutter">
<button class="w-14 h-14 bg-white text-primary rounded-full shadow-[0_8px_30px_rgba(45,90,39,0.1)] flex items-center justify-center hover:scale-105 transition-transform active:scale-95 group" style="">
<span class="material-symbols-outlined text-[28px] group-hover:rotate-12 transition-transform" style="">help</span>
</button>
</div>
</body></html>
