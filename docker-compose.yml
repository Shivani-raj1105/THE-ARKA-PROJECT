
services:
  api:
    build: .
    container_name: plant_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - shared_data:/shared
    depends_on:
      - redis
      - db

  worker:
    build: .
    container_name: plant_worker
    command: celery -A app.worker.celery_app worker --loglevel=info
    volumes:
      - .:/app
      - shared_data:/shared
    depends_on:
      - redis
      - db

  redis:
    image: redis:7
    container_name: plant_redis 
    ports:
      - "6379:6379"

  db:
    image: postgres:15
    container_name: plant_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: plants
    ports:
      - "5432:5432"

volumes:
  shared_data: