<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up | Organic Botanist</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode:"class",
    theme:{ extend:{
      colors:{
        "surface-tint":"#3b6934","secondary":"#4b6542","surface-container-low":"#f3f4f0",
        "error-container":"#ffdad6","on-primary-fixed":"#002201","inverse-primary":"#a1d494",
        "on-background":"#1a1c1a","tertiary-container":"#6d4820","on-tertiary":"#ffffff",
        "on-tertiary-container":"#ecb987","primary-fixed-dim":"#a1d494","on-secondary-fixed-variant":"#344d2c",
        "outline-variant":"#c2c9bb","background":"#f9faf6","on-error":"#ffffff","tertiary-fixed":"#ffdcbd",
        "surface-variant":"#e2e3df","error":"#ba1a1a","on-surface":"#1a1c1a","secondary-fixed-dim":"#b1cfa4",
        "surface-container-highest":"#e2e3df","on-primary-container":"#9dd090","inverse-on-surface":"#f0f1ed",
        "tertiary-fixed-dim":"#f0bd8b","secondary-fixed":"#cdebbe","on-tertiary-fixed":"#2c1600",
        "secondary-container":"#cae9bc","on-primary":"#ffffff","on-error-container":"#93000a",
        "primary-container":"#2d5a27","surface-container":"#edeeea","on-secondary":"#ffffff",
        "primary-fixed":"#bcf0ae","on-tertiary-fixed-variant":"#623f18","on-surface-variant":"#42493e",
        "surface-dim":"#d9dad7","inverse-surface":"#2e312f","tertiary":"#52320b","on-secondary-fixed":"#092005",
        "on-primary-fixed-variant":"#23501e","on-secondary-container":"#4f6a46","outline":"#72796e",
        "surface-bright":"#f9faf6","surface-container-high":"#e7e9e5","surface":"#f9faf6",
        "surface-container-lowest":"#ffffff","primary":"#154212"
      },
      borderRadius:{DEFAULT:"0.25rem",lg:"0.5rem",xl:"0.75rem",full:"9999px"},
      spacing:{xl:"80px",base:"8px",xs:"4px",sm:"12px",md:"24px",gutter:"24px",margin:"32px",lg:"48px"},
      fontFamily:{"headline-md":["Newsreader"],"headline-xl":["Newsreader"],"body-md":["Plus Jakarta Sans"],"body-lg":["Plus Jakarta Sans"],"label-sm":["Plus Jakarta Sans"],"headline-lg":["Newsreader"]},
      fontSize:{
        "headline-md":["24px",{lineHeight:"1.4",fontWeight:"500"}],
        "headline-xl":["48px",{lineHeight:"1.2",letterSpacing:"-0.02em",fontWeight:"600"}],
        "body-md":["16px",{lineHeight:"1.6",fontWeight:"400"}],
        "body-lg":["18px",{lineHeight:"1.6",fontWeight:"400"}],
        "label-sm":["14px",{lineHeight:"1.2",letterSpacing:"0.05em",fontWeight:"600"}],
        "headline-lg":["32px",{lineHeight:"1.3",fontWeight:"500"}]
      }
    }}
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .botanical-overlay { background: linear-gradient(to right, rgba(25,66,18,0.4), rgba(25,66,18,0.1)); }
</style>
</head>
<body class="bg-background text-on-surface selection:bg-primary-container selection:text-on-primary-container">
<main class="min-h-screen flex flex-col md:flex-row">

  <!-- Left: Imagery -->
  <section class="hidden md:flex md:w-1/2 lg:w-3/5 relative overflow-hidden">
    <div class="absolute inset-0 z-0">
      <img alt="Lush conservatory" class="w-full h-full object-cover"
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuBKR_2ZSDAsOQrbCafNwlNFnAaokNjeo1ajMbYeswok3YSGsR6kPu3WXk0Uf3EQYuc-WdBaPiR-URLjN7Zqzr2e3GRBQJXXb3hdsE9uvzdHM6BaUg8NoAjpF288KsYBIRzrZQK5sH8UNWnVK0nQ2gMlcx6h_JMGlnm3SxDpVWAbIMI1eEFjaRuSQU4TsSkDNzJ2Stu6piy8QsfT9x1IZ6i2g_vWriCW8dLWbvbaUFduKhRFxEx0uRYLUH6leJTwejsjqc4U31u_qp8"/>
      <div class="absolute inset-0 botanical-overlay"></div>
    </div>
    <div class="relative z-10 p-lg flex flex-col justify-between h-full">
      <div class="flex items-center gap-2">
        <span class="font-headline-lg text-white italic font-semibold">Organic Botanist</span>
      </div>
      <div class="max-w-md">
        <h1 class="font-headline-xl text-white mb-md">Discover the wisdom of the natural world.</h1>
        <p class="font-body-lg text-white/90">Join our community of plant enthusiasts and scientific experts cultivating a deeper connection with nature.</p>
      </div>
    </div>
  </section>

  <!-- Right: Form -->
  <section class="flex-1 flex flex-col justify-center items-center p-gutter md:p-lg bg-surface-container-lowest">
    <div class="w-full max-w-[440px]">
      <div class="md:hidden mb-lg text-center">
        <span class="font-headline-lg text-primary italic font-semibold">Organic Botanist</span>
      </div>
      <div class="mb-lg">
        <h2 class="font-headline-lg text-primary mb-xs">Create your account</h2>
        <p class="font-body-md text-on-surface-variant">Start your botanical journey today.</p>
      </div>

      <!-- Error banner -->
      <div id="error-banner" class="hidden mb-md bg-error-container text-on-error-container rounded-xl px-md py-sm font-body-md text-sm"></div>

      <form id="signup-form" class="space-y-md">
        <div class="space-y-xs">
          <label class="font-label-sm text-on-surface-variant ml-1" for="name">Full Name</label>
          <input id="name" type="text" placeholder="Linnaeus Smith" required
            class="w-full px-md py-sm bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary-container focus:bg-white transition-all font-body-md outline-none"/>
        </div>
        <div class="space-y-xs">
          <label class="font-label-sm text-on-surface-variant ml-1" for="email">Email Address</label>
          <input id="email" type="email" placeholder="botanist@example.com" required
            class="w-full px-md py-sm bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary-container focus:bg-white transition-all font-body-md outline-none"/>
        </div>
        <div class="space-y-xs">
          <label class="font-label-sm text-on-surface-variant ml-1" for="phone">Phone Number</label>
          <input id="phone" type="tel" placeholder="+1 (555) 000-0000"
            class="w-full px-md py-sm bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary-container focus:bg-white transition-all font-body-md outline-none"/>
        </div>
        <div class="space-y-xs">
          <label class="font-label-sm text-on-surface-variant ml-1" for="password">New Password</label>
          <div class="relative">
            <input id="password" type="password" placeholder="••••••••" required minlength="8"
              class="w-full px-md py-sm bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary-container focus:bg-white transition-all font-body-md outline-none"/>
            <button type="button" onclick="togglePw('password', this)" class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors">
              <span class="material-symbols-outlined text-[20px]">visibility</span>
            </button>
          </div>
        </div>
        <div class="space-y-xs">
          <label class="font-label-sm text-on-surface-variant ml-1" for="confirm-password">Confirm Password</label>
          <div class="relative">
            <input id="confirm-password" type="password" placeholder="••••••••" required
              class="w-full px-md py-sm bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary-container focus:bg-white transition-all font-body-md outline-none"/>
            <button type="button" onclick="togglePw('confirm-password', this)" class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors">
              <span class="material-symbols-outlined text-[20px]">visibility</span>
            </button>
          </div>
        </div>
        <div class="flex items-start gap-sm pt-xs">
          <input id="terms" type="checkbox" required class="mt-1 w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary"/>
          <label class="font-body-md text-on-surface-variant text-sm" for="terms">
            I agree to the <a href="#" class="text-primary font-medium hover:underline">Terms of Service</a> and <a href="#" class="text-primary font-medium hover:underline">Privacy Policy</a>.
          </label>
        </div>
        <button id="submit-btn" type="submit"
          class="w-full py-sm bg-primary-container text-on-primary-container font-label-sm rounded-xl shadow-[0_4px_20px_rgba(45,90,39,0.15)] hover:bg-primary hover:text-white transition-all active:scale-[0.98] mt-md">
          Create Account
        </button>
      </form>

      <div class="mt-xl text-center">
        <p class="font-body-md text-on-surface-variant">
          Already have an account?
          <a href="/login" class="text-primary font-semibold hover:underline underline-offset-4 ml-1">Sign In</a>
        </p>
      </div>
    </div>
  </section>
</main>

<script>
function togglePw(id, btn) {
  const input = document.getElementById(id);
  const icon = btn.querySelector('.material-symbols-outlined');
  if (input.type === 'password') { input.type = 'text'; icon.textContent = 'visibility_off'; }
  else { input.type = 'password'; icon.textContent = 'visibility'; }
}
</script>
<script type="module">
import { register, isLoggedIn } from '/api.js';

// Do not auto-redirect — always show signup page

const form = document.getElementById('signup-form');
const btn = document.getElementById('submit-btn');
const errorBanner = document.getElementById('error-banner');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorBanner.classList.add('hidden');

  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm-password').value;

  if (password !== confirm) {
    errorBanner.textContent = 'Passwords do not match.';
    errorBanner.classList.remove('hidden');
    return;
  }
  if (password.length < 8) {
    errorBanner.textContent = 'Password must be at least 8 characters.';
    errorBanner.classList.remove('hidden');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Creating account…';

  try {
    await register(name, email, password, phone || null);
    window.location.href = '/identify';
  } catch (err) {
    errorBanner.textContent = err.message;
    errorBanner.classList.remove('hidden');
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
});
</script>
</body>
</html>
